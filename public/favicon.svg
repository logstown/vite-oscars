<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F7E07A"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7010"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#7A5A10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0D0D1A"/>

  <!-- Head -->
  <circle cx="16" cy="6.5" r="3.2" fill="url(#gold)"/>

  <!-- Neck -->
  <rect x="14.8" y="9.4" width="2.4" height="1.8" fill="url(#gold)"/>

  <!-- Torso: wide at shoulders, narrow at waist, wide at hips -->
  <path d="M11.5 11.2 L20.5 11.2 L19.2 17.5 L12.8 17.5 Z" fill="url(#gold)"/>

  <!-- Legs (slight flare at bottom) -->
  <path d="M12.8 17.5 L12.2 20.2 L19.8 20.2 L19.2 17.5 Z" fill="url(#gold)"/>

  <!-- Base tier 1 (narrow) -->
  <rect x="12" y="20.2" width="8" height="2" rx="0.5" fill="url(#base)"/>

  <!-- Base tier 2 (wide) -->
  <rect x="10" y="22.2" width="12" height="3.5" rx="1" fill="url(#base)"/>
</svg>
